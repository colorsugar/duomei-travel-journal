<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>多美 | Travel Journal</title>
  <link rel="stylesheet" href="./css/archive.css?v=20260626-cms-v3">
</head>
<body>
  <div class="ambient" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>
  <div class="cursor-trail" aria-hidden="true"></div>
  <div class="cursor-icon" aria-hidden="true"></div>
  <div class="reading-progress" aria-hidden="true"><span></span></div>

  <header class="topbar">
    <button class="brand" type="button" data-action="home">多美</button>
    <div class="topbar-actions">
      <button class="pill" type="button" data-view="journey">Journey</button>
      <button class="pill" type="button" data-view="tags">Tags</button>
      <button class="pill" type="button" data-view="stats">Stats</button>
      <button class="pill edit-only admin-only" type="button" data-action="export">导出 JSON</button>
      <button class="pill edit-only admin-only" type="button" data-action="import">导入 JSON</button>
      <input id="importInput" class="sr-file" type="file" accept="application/json">
    </div>
  </header>

  <main>
    <section id="homeView" class="view active">
      <section class="hero">
        <div class="hero-art" aria-hidden="true">
          <span class="cloud c1"></span>
          <span class="cloud c2"></span>
          <span class="cloud c3"></span>
          <span class="wind w1"></span>
          <span class="wind w2"></span>
          <span class="wind w3"></span>
          <span class="plane">
            <svg viewBox="0 0 64 64" aria-hidden="true">
              <path d="M7 33 57 9 42 56 31 39 17 47 24 35z"></path>
              <path d="M31 39 57 9"></path>
            </svg>
          </span>
        </div>
        <div class="hero-copy reveal">
          <h1 class="site-title editable" data-bind="site.title">多美</h1>
          <p class="site-subtitle editable" data-bind="site.subtitle">Travel Journal</p>
          <p class="site-poem editable" data-bind="site.poem">记录一路看到的风景，<br>也记录一路走过的生活。</p>
        </div>
      </section>

      <section class="journey-section">
        <div class="section-head">
          <p class="section-kicker">Journey</p>
          <h2>慢慢翻阅</h2>
          <label class="search-wrap">
            <input id="searchInput" type="search" placeholder="搜索城市、正文、Tag、年份">
          </label>
        </div>
        <div id="searchResults" class="search-results" aria-live="polite"></div>
        <div id="journeyGrid" class="journey-grid"></div>
      </section>
    </section>

    <section id="detailView" class="view"></section>

    <section id="tagsView" class="view page-pad">
      <div class="page-title reveal">
        <p class="section-kicker">Tags</p>
        <h1>漂浮的记忆</h1>
        <p>Tag 会随着出现次数变大，并在页面里缓慢移动。点击一个 Tag，就能翻到相关旅程。</p>
      </div>
      <div id="tagCloud" class="tag-cloud"></div>
      <div id="tagResults" class="tag-results"></div>
    </section>

    <section id="statsView" class="view page-pad">
      <div class="page-title reveal">
        <p class="section-kicker">Archive</p>
        <h1>旅行统计</h1>
        <p>这里会随着城市、照片、Tag 和浏览量自动成长。</p>
      </div>
      <div id="statsGrid" class="stats-grid"></div>
    </section>
  </main>

  <footer class="footer">多美 © 2026</footer>

  <div class="float-panel">
    <button type="button" data-action="top">Top</button>
    <button type="button" data-action="random">Random</button>
    <button type="button" data-action="next">Next</button>
  </div>

  <button id="adminEntry" class="admin-entry" type="button">Admin</button>
  <button id="quickAddCity" class="quick-add edit-only admin-only" type="button" data-action="add-city">＋ 添加城市</button>
  <button id="editToggle" class="edit-toggle admin-only" type="button" aria-pressed="false">编辑模式</button>
  <button id="adminPublish" class="publish-toggle admin-only" type="button">发布</button>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <div id="textToolbar" class="text-toolbar admin-only" aria-label="文字样式">
    <select data-style="font" title="字体">
      <option value="">默认无衬线</option>
      <option value="'SimSun', 'Songti SC', serif">宋体风</option>
      <option value="'Hiragino Mincho ProN', 'Yu Mincho', serif">明朝体 / serif</option>
      <option value="'Comic Sans MS', 'Arial Rounded MT Bold', 'Yu Gothic', sans-serif">圆体风</option>
    </select>
    <input data-style="size" type="number" min="12" max="120" value="18" title="字号">
    <input data-style="color" type="color" value="#3d3a34" title="颜色">
    <select data-style="weight" title="粗细">
      <option value="300">细</option>
      <option value="400">常规</option>
      <option value="600">半粗</option>
      <option value="700">粗</option>
    </select>
    <select data-style="align" title="对齐">
      <option value="left">左对齐</option>
      <option value="center">居中</option>
      <option value="right">右对齐</option>
    </select>
    <input data-style="lineHeight" type="number" min="1" max="3" step=".1" value="1.8" title="行距">
  </div>

  <dialog id="adminDialog" class="dialog">
    <form method="dialog" class="dialog-card">
      <header class="dialog-head">
        <h2>管理员</h2>
        <button id="adminClose" class="dialog-close" value="cancel" aria-label="关闭">×</button>
      </header>
      <p class="admin-note">GitHub Token 不会进入网页。请填写 Cloudflare Worker 地址和管理员密钥，密钥只保存在当前浏览器会话。</p>
      <label class="admin-field">Worker 地址<input id="workerUrl" placeholder="https://duomei-travel-journal-admin.your-name.workers.dev"></label>
      <label class="admin-field">管理员密钥<input id="adminKey" type="password" autocomplete="current-password" placeholder="ADMIN_KEY"></label>
      <div class="dialog-actions">
        <button id="adminRestoreDraft" class="pill" type="button">恢复草稿</button>
        <button id="adminEdit" class="pill" type="button">进入编辑</button>
        <button id="adminConnect" class="pill primary" type="button">连接后台</button>
      </div>
    </form>
  </dialog>

  <dialog id="cityDialog" class="dialog">
    <form method="dialog" class="dialog-card">
      <header class="dialog-head">
        <h2 id="cityDialogTitle">新增城市</h2>
        <button class="dialog-close" value="cancel" aria-label="关闭">×</button>
      </header>
      <div class="form-grid">
        <label>城市名称<input id="cityTitle" required></label>
        <label>英文 slug<input id="citySlug" placeholder="hokkaido"></label>
        <label>日期<input id="cityPublished" placeholder="2026.06"></label>
        <label>地点<input id="cityPlace" placeholder="Osaka, Japan"></label>
        <label>分类<input id="cityCategory" placeholder="Travel"></label>
        <label>Tag<input id="cityTags" placeholder="海边, 夜景, Nikon"></label>
        <label class="wide">简介<textarea id="cityExcerpt" rows="3"></textarea></label>
        <label class="wide">正文<textarea id="cityBody" rows="6"></textarea></label>
        <label>上传封面<input id="cityCover" type="file" accept="image/*"></label>
        <label>添加 Gallery<input id="cityGallery" type="file" accept="image/*" multiple></label>
      </div>
      <footer class="dialog-actions">
        <button class="pill" value="cancel">取消</button>
        <button class="pill primary" value="default" data-action="save-city">保存</button>
      </footer>
    </form>
  </dialog>

  <dialog id="cropDialog" class="dialog crop-dialog">
    <form method="dialog" class="dialog-card">
      <header class="dialog-head">
        <h2>裁剪照片</h2>
        <span id="cropZoomText">100%</span>
      </header>
      <div id="cropStage" class="crop-stage">
        <img id="cropImage" alt="">
        <div class="crop-frame" aria-hidden="true"></div>
      </div>
      <input id="cropZoom" class="crop-range" type="range" min="1" max="3" step=".01" value="1">
      <footer class="dialog-actions">
        <button class="pill" value="cancel" data-action="crop-cancel">取消</button>
        <button class="pill" type="button" data-action="crop-reset">重置</button>
        <button class="pill primary" type="button" data-action="crop-save">保存图片</button>
      </footer>
    </form>
  </dialog>

  <div id="lightbox" class="lightbox" aria-hidden="true">
    <button type="button" class="lightbox-close" data-action="lightbox-close">×</button>
    <button type="button" class="lightbox-nav prev" data-action="lightbox-prev">‹</button>
    <img id="lightboxImage" alt="">
    <button type="button" class="lightbox-nav next" data-action="lightbox-next">›</button>
    <p id="lightboxCaption"></p>
  </div>

  <script src="./js/data.js?v=20260626-cms-v3"></script>
  <script src="./js/store.js?v=20260626-cms-v3"></script>
  <script src="./js/image.js?v=20260626-cms-v3"></script>
  <script src="./js/render.js?v=20260626-cms-v3"></script>
  <script src="./js/editor.js?v=20260626-cms-v3"></script>
  <script src="./js/interactions.js?v=20260626-cms-v3"></script>
  <script src="./js/cms-client.js?v=20260626-cms-v3"></script>
  <script src="./js/admin.js?v=20260626-cms-v3"></script>
  <script src="./js/app.js?v=20260626-cms-v3"></script>
</body>
</html>
